site_name: AIRecon
site_description: AI-Powered Autonomous Penetration Testing Agent
site_url: https://pikpikcu.github.io/airecon/
repo_url: https://github.com/pikpikcu/airecon
repo_name: pikpikcu/airecon
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
  font:
    text: Manrope
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Configuration: configuration.md
  - Features: features.md
  - Tools Reference: tools.md
  - Skills:
    - Creating Skills: development/creating_skills.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pikpikcu/airecon
      name: AIRecon on GitHub
    - icon: fontawesome/brands/github
      link: https://github.com/pikpikcu/airecon-skills
      name: airecon-skills community library
  version:
    provider: mike

extra_css:
  - assets/custom.css

copyright: >
  Copyright &copy; 2026 pikpikcu —
  <a href="https://github.com/pikpikcu/airecon/blob/main/LICENSE">MIT License</a>
