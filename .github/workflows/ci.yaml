name: AIRecon CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pytest pytest-cov pytest-asyncio pytest-mock pytest-timeout

      - name: Lint with Ruff
        run: ruff check . --fix
        
      - name: Security Scan with Bandit
        run: bandit -r airecon/ -x "**/tests/**,**/__pycache__/**" --skip B105,B107 -ll

      - name: Type Check with Pyright
        uses: jakebailey/pyright-action@v2
        with:
          working-directory: .

  unit-tests:
    needs: quality-and-security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock pytest-timeout pytest-anyio

      - name: Run Tests with Coverage
        run: |
          pytest tests/ --doctest-modules --junitxml=junit/test-results.xml --cov=airecon --cov-report=xml --cov-fail-under=70

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: junit/test-results.xml