name: AIRecon CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        curl -sSL https://install.python-poetry.org | python3 -
        poetry install --with dev
        poetry run playwright install chromium
        
    - name: Lint with autopep8
      run: |
        # Ensure codebase matches basic pep8 style without breaking builds entirely
        poetry run autopep8 --in-place --recursive airecon tests || true
        
    - name: Test with pytest
      run: |
        # Run local unit tests (mocking external connections)
        poetry run pytest tests/
